# NGINX DDoS Mitigation Configuration
# Place this in /etc/nginx/sites-available/iot-ddos

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ddos_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# SYN flood protection
limit_req_zone $binary_remote_addr zone=syn_limit:10m rate=5r/s;

# Upstream to your IoT server
upstream iot_backend {
    server 127.0.0.1:5000;
}

server {
    listen 8080;
    server_name localhost;

    # Connection limits
    limit_conn conn_limit 10;
    limit_req zone=ddos_limit burst=20 nodelay;
    
    # Timeout settings to prevent slowloris
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 5s 5s;
    send_timeout 10s;

    # Buffer size limits
    client_body_buffer_size 1K;
    client_header_buffer_size 1k;
    client_max_body_size 1k;
    large_client_header_buffers 2 1k;

    # Block suspicious User-Agents (basic filtering)
    if ($http_user_agent ~* (bot|crawler|spider|scan)) {
        return 403;
    }

    # Logging
    access_log /var/log/nginx/iot_access.log;
    error_log /var/log/nginx/iot_error.log;

    location / {
        # Apply rate limiting
        limit_req zone=syn_limit burst=5;
        
        # Proxy to IoT backend
        proxy_pass http://iot_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Timeout settings
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Block direct IP access attempts
    location = /admin {
        return 403;
    }
}
